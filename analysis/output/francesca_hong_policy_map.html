<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francesca Hong for Governor — Policy Impact Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; }

  #app { display: flex; flex-direction: row; height: 100vh; }

  /* ── Sidebar ── */
  #sidebar {
    width: 320px; min-width: 280px; max-width: 320px;
    background: #f8f9fa;
    border-right: 1px solid #dee2e6;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 2px 0 8px rgba(0,0,0,0.08);
    z-index: 10;
  }
  #sidebar-header {
    background: linear-gradient(135deg, #1a5276 0%, #2e86c1 100%);
    color: white;
    padding: 16px 14px 12px;
    flex-shrink: 0;
  }
  #sidebar-header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; opacity: 0.85; }
  #sidebar-header h2 { font-size: 18px; font-weight: 700; margin-top: 2px; }
  #sidebar-header p { font-size: 11px; opacity: 0.75; margin-top: 4px; }

  #sidebar-controls { padding: 10px 12px 6px; flex-shrink: 0; border-bottom: 1px solid #dee2e6; background: #fff; }

  #search-box {
    width: 100%; padding: 7px 10px; border: 1px solid #ced4da; border-radius: 6px;
    font-size: 13px; color: #333; outline: none; transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  #search-box:focus { border-color: #2e86c1; box-shadow: 0 0 0 2px rgba(46,134,193,0.15); }

  #category-filters {
    display: flex; flex-wrap: wrap; gap: 4px; padding-bottom: 2px;
  }
  .cat-btn {
    padding: 3px 8px; border: none; border-radius: 10px; font-size: 11px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
    background: #e9ecef; color: #495057;
  }
  .cat-btn:hover { filter: brightness(0.92); }
  .cat-btn.active { color: white; }

  #policy-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
  #policy-list::-webkit-scrollbar { width: 5px; }
  #policy-list::-webkit-scrollbar-track { background: #f0f2f5; }
  #policy-list::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 3px; }

  .policy-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    margin-bottom: 3px; transition: background 0.12s; border: 1px solid transparent;
    background: white;
  }
  .policy-item:hover { background: #e8f4fd; border-color: #bee3f8; }
  .policy-item.selected { background: #dbeafe; border-color: #2e86c1; }

  .policy-badge {
    flex-shrink: 0; font-size: 9px; font-weight: 700; padding: 2px 5px;
    border-radius: 3px; background: #1a5276; color: white; margin-top: 1px;
    white-space: nowrap; letter-spacing: 0.02em;
  }
  .policy-title { font-size: 12px; font-weight: 500; color: #2c3e50; flex: 1; line-height: 1.35; }
  .quality-dot {
    flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; margin-top: 4px;
  }
  .quality-dot.strong { background: #27ae60; }
  .quality-dot.moderate { background: #f39c12; }
  .quality-dot.weak { background: #e74c3c; }

  .no-results { text-align: center; color: #6c757d; font-size: 13px; padding: 20px 0; }

  /* ── Map container ── */
  #map-area { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  /* ── Info panel ── */
  #info-panel {
    position: absolute; top: 12px; right: 12px; width: 340px;
    background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 1000; overflow: hidden; display: none;
  }
  #info-panel.visible { display: block; }

  #info-header {
    background: linear-gradient(135deg, #1a5276 0%, #2e86c1 100%);
    color: white; padding: 12px 14px;
  }
  #info-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
  .info-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .badge {
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    display: inline-block;
  }
  .badge-cat { background: rgba(255,255,255,0.25); color: white; }
  .badge-quality-strong { background: #27ae60; color: white; }
  .badge-quality-moderate { background: #f39c12; color: white; }
  .badge-quality-weak { background: #e74c3c; color: white; }

  #info-body { padding: 12px 14px; max-height: calc(100vh - 160px); overflow-y: auto; }
  #info-body::-webkit-scrollbar { width: 4px; }
  #info-body::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 2px; }

  .info-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: #6c757d; margin: 10px 0 5px;
  }
  .info-finding {
    font-size: 12px; color: #2c3e50; line-height: 1.5;
    background: #f8f9fa; border-left: 3px solid #2e86c1;
    padding: 7px 10px; border-radius: 0 4px 4px 0;
  }

  .stat-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .stat-label { font-size: 11px; color: #6c757d; }
  .stat-value { font-size: 11px; font-weight: 600; color: #2c3e50; }

  .county-list { list-style: none; }
  .county-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px; border-radius: 4px; margin-bottom: 2px;
    font-size: 11px;
  }
  .county-list li:nth-child(odd) { background: #f8f9fa; }
  .county-rank { color: #6c757d; font-weight: 600; min-width: 18px; }
  .county-name { flex: 1; color: #2c3e50; }
  .county-val {
    font-weight: 600; color: #1a5276; background: #dbeafe;
    padding: 1px 6px; border-radius: 3px; white-space: nowrap;
  }

  #close-info {
    position: absolute; top: 8px; right: 8px;
    background: rgba(255,255,255,0.2); border: none; color: white;
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    font-size: 13px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #close-info:hover { background: rgba(255,255,255,0.35); }

  /* County click panel */
  #county-panel {
    position: absolute; bottom: 36px; right: 12px; width: 300px;
    background: white; border-radius: 8px; box-shadow: 0 3px 14px rgba(0,0,0,0.12);
    z-index: 1000; display: none; padding: 12px 14px;
  }
  #county-panel.visible { display: block; }
  #county-panel-title { font-size: 14px; font-weight: 700; color: #1a5276; margin-bottom: 8px; }
  #close-county {
    position: absolute; top: 8px; right: 8px;
    background: #f0f2f5; border: none; color: #495057;
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
  }
  #close-county:hover { background: #dee2e6; }

  .acs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .acs-item { background: #f8f9fa; border-radius: 4px; padding: 5px 7px; }
  .acs-item-label { font-size: 9px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.04em; }
  .acs-item-value { font-size: 13px; font-weight: 700; color: #1a5276; }

  /* Leaflet legend override */
  .leaflet-control.legend {
    background: white; padding: 8px 10px; border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12); min-width: 130px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .legend-title { font-size: 10px; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .legend-gradient {
    width: 100%; height: 10px; border-radius: 3px;
    background: linear-gradient(to right, #ffffcc, #fd8d3c, #800026);
    margin: 5px 0;
  }
  .legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: #495057; }

  /* Tooltip */
  .county-tooltip { font-size: 12px; font-family: inherit; }
  .county-tooltip strong { color: #1a5276; }

  /* Loading overlay */
  #loading {
    position: absolute; inset: 0; background: rgba(255,255,255,0.88);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #dee2e6;
    border-top-color: #2e86c1; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #6c757d; font-size: 13px; }

  /* Footer */
  #footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
    padding: 4px 12px; font-size: 10px; color: #6c757d;
    border-top: 1px solid #dee2e6; z-index: 500; text-align: center;
  }

  /* Responsive */
  @media (max-width: 700px) {
    #sidebar { width: 260px; min-width: 220px; }
    #info-panel { width: 280px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Francesca Hong for Governor</h1>
      <h2>Policy Impact Map</h2>
      <p>Wisconsin 2026 Gubernatorial Campaign &bull; ACS 2023 Data</p>
    </div>
    <div id="sidebar-controls">
      <input id="search-box" type="text" placeholder="Search policies..." autocomplete="off"/>
      <div id="category-filters"></div>
    </div>
    <div id="policy-list"></div>
  </div>

  <div id="map-area">
    <div id="loading"><div class="spinner"></div><p>Loading Wisconsin county map&hellip;</p></div>
    <div id="map"></div>
    <div id="info-panel">
      <div id="info-header">
        <div id="info-title"></div>
        <div class="info-badges" id="info-badges"></div>
        <button id="close-info" title="Close">&times;</button>
      </div>
      <div id="info-body"></div>
    </div>
    <div id="county-panel">
      <div id="county-panel-title"></div>
      <button id="close-county" title="Close">&times;</button>
      <div id="county-panel-body"></div>
    </div>
    <div id="footer">Data: ACS 2023, CDC PLACES 2023, USDA 2019 &nbsp;&bull;&nbsp; Built with PDI (policy-data-infrastructure)</div>
  </div>
</div>

// ══════════════════════════════════════════════
// CHOROPLETH METRIC FUNCTIONS
// ══════════════════════════════════════════════
function getMetricForCounty(county, equity_dimension) {
  const p = county.poverty_rate;
  const inc = county.median_hh_income;
  const black = county.pct_non_hispanic_black;
  const cost = county.pct_cost_burdened;
  const scost = county.pct_severely_cost_burdened;
  const unins = county.uninsured_rate;

  switch(equity_dimension) {
    case "food_access":         return p;
    case "childcare_access":    return p;
    case "education_funding":   return -inc; // inverted
    case "education_equity":    return (black / 100) * p;
    case "housing_affordability": return cost;
    case "housing_stability":   return scost;
    case "eviction_prevention": return (cost / 100) * p;
    case "transit_access":      return p;
    case "health_access":       return unins;
    case "income_equity":       return -inc; // inverted
    case "economic_equity": {
      // composite: normalize each 0-1 first
      const allP = ACS_DATA.map(c => c.poverty_rate);
      const allC = ACS_DATA.map(c => c.pct_cost_burdened);
      const minP = Math.min(...allP), maxP = Math.max(...allP);
      const minC = Math.min(...allC), maxC = Math.max(...allC);
      const np = (p - minP) / (maxP - minP);
      const nc = (cost - minC) / (maxC - minC);
      return np + nc;
    }
    case "labor_rights":        return -inc; // inverted
    case "environmental_health": return p;
    case "criminal_justice":    return (black / 100) * p;
    default:                    return p;
  }
}

function computeMetrics(equity_dimension) {
  const vals = ACS_DATA.map(c => ({
    geoid: c.geoid,
    value: getMetricForCounty(c, equity_dimension),
    county: c
  }));
  return vals;
}

function normalize01(vals) {
  const raw = vals.map(v => v.value);
  let mn = Math.min(...raw), mx = Math.max(...raw);
  if (mn === mx) return vals.map(v => ({...v, norm: 0}));
  return vals.map(v => ({...v, norm: (v.value - mn) / (mx - mn)}));
}

// Colour scale: ffffcc → fd8d3c → 800026
function needColor(norm) {
  if (norm === null || norm === undefined || isNaN(norm)) return "#d3d3d3";
  const stops = [
    {t:0,   r:0xff,g:0xff,b:0xcc},
    {t:0.25,r:0xfe,g:0xd9,b:0x76},
    {t:0.5, r:0xfd,g:0x8d,b:0x3c},
    {t:0.75,r:0xe3,g:0x1a,b:0x1c},
    {t:1,   r:0x80,g:0x00,b:0x26}
  ];
  let a = stops[0], b2 = stops[stops.length-1];
  for (let i = 0; i < stops.length-1; i++) {
    if (norm >= stops[i].t && norm <= stops[i+1].t) {
      a = stops[i]; b2 = stops[i+1]; break;
    }
  }
  const t2 = (b2.t === a.t) ? 0 : (norm - a.t) / (b2.t - a.t);
  const r = Math.round(a.r + (b2.r - a.r) * t2);
  const g = Math.round(a.g + (b2.g - a.g) * t2);
  const b = Math.round(a.b + (b2.b - a.b) * t2);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// Build geoid → norm lookup
function buildColorMap(equity_dimension) {
  const vals = computeMetrics(equity_dimension);
  const normed = normalize01(vals);
  const map = {};
  normed.forEach(v => { map[v.geoid] = {norm: v.norm, raw: v.value, county: v.county}; });
  return map;
}

let map;

// ══════════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════════
function initMap() {
  map = L.map("map", {
    center: [44.7, -89.8],
    zoom: 7,
    zoomSnap: 0.25,
    preferCanvas: false
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 12,
    opacity: 0.35
  }).addTo(map);

  // Legend
  const legend = L.control({position: "bottomright"});
  legend.onAdd = function() {
    const div = L.DomUtil.create("div", "leaflet-control legend");
    div.innerHTML = `
      <div class="legend-title">Need Level</div>
      <div class="legend-gradient"></div>
      <div class="legend-labels"><span>Lower Need</span><span>Higher Need</span></div>
      <div style="margin-top:6px;font-size:10px;color:#999">
        <span style="display:inline-block;width:10px;height:10px;background:#d3d3d3;border-radius:2px;margin-right:3px;vertical-align:middle"></span>No data
      </div>
    `;
    return div;
  };
  legend.addTo(map);

  loadGeoJSON();
}

function loadGeoJSON() {
  // GeoJSON is embedded inline — no fetch required, works from file://
  geojson = WI_COUNTIES_GEOJSON;
  document.getElementById("loading").style.display = "none";
  selectPolicy("FH-EDU-001");
}

// ══════════════════════════════════════════════
// LAYER RENDERING
// ══════════════════════════════════════════════
function renderLayer() {
  if (!geojson) return;
  if (geoLayer) { map.removeLayer(geoLayer); }

  geoLayer = L.geoJSON(geojson, {
    style: feature => {
      const geoid = getGeoid(feature);
      const entry = colorMap[geoid];
      return {
        fillColor: entry ? needColor(entry.norm) : "#d3d3d3",
        fillOpacity: 0.82,
        color: "#fff",
        weight: 0.8
      };
    },
    onEachFeature: (feature, layer) => {
      const geoid = getGeoid(feature);
      const acs = acsById[geoid];
      const name = acs ? acs.county_name : (feature.properties.NAME || feature.properties.name || geoid);
      const entry = colorMap[geoid];

      layer.bindTooltip(() => {
        let metricStr = "—";
        if (entry) {
          const card = cardById[selectedPolicyId];
          metricStr = formatMetric(entry.raw, card ? card.equity_dimension : null);
        }
        return `<div class="county-tooltip">
          <strong>${name}</strong><br>
          ${entry ? `Need metric: <b>${metricStr}</b>` : "No data"}
          ${acs ? `<br>Pop: ${acs.total_population.toLocaleString()}` : ""}
        </div>`;
      }, {sticky: true});

      layer.on({
        mouseover: e => {
          e.target.setStyle({weight: 2.5, color: "#1a5276", fillOpacity: 0.95});
          e.target.bringToFront();
        },
        mouseout: e => {
          geoLayer.resetStyle(e.target);
        },
        click: e => {
          showCountyPanel(geoid);
        }
      });
    }
  }).addTo(map);

  map.fitBounds(geoLayer.getBounds(), {padding: [20, 20]});
}

function getGeoid(feature) {
  // GeoJSON features have id = 5-digit FIPS (e.g. "55029") — use it directly
  if (feature.id) return String(feature.id);
  const p = feature.properties;
  if (p.GEOID) return p.GEOID;
  if (p.FIPS) return p.FIPS;
  if (p.GEO_ID) return p.GEO_ID.replace("0500000US","");
  if (p.STATE && p.COUNTY) return p.STATE + p.COUNTY;
  // Try to match by name
  if (p.NAME || p.name) {
    const nm = (p.NAME || p.name).toLowerCase().replace(" county","").trim();
    for (const c of ACS_DATA) {
      const cn = c.county_name.toLowerCase().replace(" county","").trim();
      if (cn === nm) return c.geoid;
    }
  }
  return null;
}

// ══════════════════════════════════════════════
// POLICY SELECTION
// ══════════════════════════════════════════════
function selectPolicy(policyId) {
  selectedPolicyId = policyId;

  // Update sidebar highlight
  document.querySelectorAll(".policy-item").forEach(el => {
    el.classList.toggle("selected", el.dataset.id === policyId);
  });

  const card = cardById[policyId];
  if (card) {
    colorMap = buildColorMap(card.equity_dimension);
    renderLayer();
    showInfoPanel(card);
  } else {
    // policy has no card — still recolor with default
    colorMap = {};
    renderLayer();
    hideInfoPanel();
  }
}

// ══════════════════════════════════════════════
// INFO PANEL
// ══════════════════════════════════════════════
function showInfoPanel(card) {
  const panel = document.getElementById("info-panel");
  const title = document.getElementById("info-title");
  const badges = document.getElementById("info-badges");
  const body = document.getElementById("info-body");

  title.textContent = card.policy_title;

  const catColor = CAT_COLORS[card.category] || "#2e86c1";
  badges.innerHTML = `
    <span class="badge badge-cat" style="background:${catColor}88">${card.category}</span>
    <span class="badge badge-quality-${card.data_quality || 'moderate'}">${(card.data_quality||'').toUpperCase()}</span>
  `;

  // Build body
  let html = "";

  if (card.key_finding) {
    html += `<div class="info-section-title">Key Finding</div>
    <div class="info-finding">${card.key_finding}</div>`;
  }

  // Statewide stats
  const ctxKeys = Object.keys(card.statewide_context || {});
  if (ctxKeys.length) {
    html += `<div class="info-section-title">Statewide Context</div>`;
    ctxKeys.forEach(k => {
      const s = card.statewide_context[k];
      html += `<div style="margin-bottom:6px">
        <div style="font-size:10px;font-weight:600;color:#495057;margin-bottom:2px">${formatKey(k)}</div>
        <div class="stat-row"><span class="stat-label">Mean</span><span class="stat-value">${formatStat(k, s.mean)}</span></div>
        <div class="stat-row"><span class="stat-label">Min</span><span class="stat-value">${formatStat(k, s.min)}</span></div>
        <div class="stat-row"><span class="stat-label">Max</span><span class="stat-value">${formatStat(k, s.max)}</span></div>
        <div class="stat-row"><span class="stat-label">Counties w/ data</span><span class="stat-value">${s.count || 72}</span></div>
      </div>`;
    });
  }

  // Top need
  if (card.top_need_counties && card.top_need_counties.length) {
    html += `<div class="info-section-title">Top 5 Highest Need</div>
    <ul class="county-list">`;
    card.top_need_counties.forEach((c, i) => {
      const dv = c.display_value != null ? c.display_value : c.metric_value;
      html += `<li>
        <span class="county-rank">${i+1}</span>
        <span class="county-name">${c.county_name}</span>
        <span class="county-val">${formatDispVal(dv, card.equity_dimension)}</span>
      </li>`;
    });
    html += `</ul>`;
  }

  // Bottom need
  if (card.bottom_need_counties && card.bottom_need_counties.length) {
    html += `<div class="info-section-title">Top 5 Lowest Need</div>
    <ul class="county-list">`;
    card.bottom_need_counties.forEach((c, i) => {
      const dv = c.display_value != null ? c.display_value : c.metric_value;
      html += `<li>
        <span class="county-rank">${i+1}</span>
        <span class="county-name">${c.county_name}</span>
        <span class="county-val">${formatDispVal(dv, card.equity_dimension)}</span>
      </li>`;
    });
    html += `</ul>`;
  }

  body.innerHTML = html;
  panel.classList.add("visible");
}

function hideInfoPanel() {
  document.getElementById("info-panel").classList.remove("visible");
}

      <div class="acs-item"><div class="acs-item-label">Median HH Income</div><div class="acs-item-value">$${Math.round(acs.median_hh_income).toLocaleString()}</div></div>
      <div class="acs-item"><div class="acs-item-label">Poverty Rate</div><div class="acs-item-value">${acs.poverty_rate}%</div></div>

// ══════════════════════════════════════════════
// SIDEBAR RENDERING
// ══════════════════════════════════════════════
function getCategories() {
  const cats = new Set(policyWithCard.map(p => p.category));
  return ["All", ...Array.from(cats).sort()];
}

function buildCategoryFilters() {
  const container = document.getElementById("category-filters");
  getCategories().forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === "All" ? " active" : "");
    btn.textContent = cat;
    if (cat !== "All") {
      btn.style.background = (CAT_COLORS[cat] || "#6c757d") + "22";
      btn.style.color = CAT_COLORS[cat] || "#6c757d";
      btn.style.borderColor = CAT_COLORS[cat] || "#6c757d";
    } else {
      btn.style.background = "#1a5276";
      btn.style.color = "white";
    }
    btn.dataset.cat = cat;
    btn.addEventListener("click", () => {
      activeCategory = cat;
      document.querySelectorAll(".cat-btn").forEach(b => {
        b.classList.remove("active");
        if (b.dataset.cat !== "All") {
          b.style.background = (CAT_COLORS[b.dataset.cat] || "#6c757d") + "22";
          b.style.color = CAT_COLORS[b.dataset.cat] || "#6c757d";
        } else {
          b.style.background = "#e9ecef";
          b.style.color = "#495057";
        }
      });
      btn.classList.add("active");
      if (cat === "All") {
        btn.style.background = "#1a5276";
        btn.style.color = "white";
      } else {
        btn.style.background = CAT_COLORS[cat] || "#6c757d";
        btn.style.color = "white";
      }
      renderPolicyList();
    });
    container.appendChild(btn);
  });
}

function renderPolicyList() {
  const container = document.getElementById("policy-list");
  let policies = policyWithCard;

  if (activeCategory !== "All") {
    policies = policies.filter(p => p.category === activeCategory);
  }
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    policies = policies.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.id.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q)
    );
  }

  if (policies.length === 0) {
    container.innerHTML = `<div class="no-results">No policies match your filter.</div>`;
    return;
  }

  container.innerHTML = "";
  policies.forEach(p => {
    const card = cardById[p.id];
    const quality = card ? (card.data_quality || "moderate") : "moderate";
    const div = document.createElement("div");
    div.className = "policy-item" + (p.id === selectedPolicyId ? " selected" : "");
    div.dataset.id = p.id;
    div.innerHTML = `
      <span class="policy-badge">${p.id}</span>
      <span class="policy-title">${p.title}</span>
      <span class="quality-dot ${quality}" title="Data quality: ${quality}"></span>
    `;
    div.addEventListener("click", () => selectPolicy(p.id));
    container.appendChild(div);
  });
}

// ══════════════════════════════════════════════
// FORMATTING HELPERS
// ══════════════════════════════════════════════
function formatKey(k) {
  return k.replace(/_/g, " ").replace(/\w/g, l => l.toUpperCase());
}

function formatStat(key, val) {
  if (val === null || val === undefined) return "—";
  if (key.includes("income")) return "$" + Math.abs(Math.round(val)).toLocaleString();
  if (key.includes("rate") || key.includes("pct") || key.includes("percent")) return Math.abs(val).toFixed(1) + "%";
  return Math.abs(val).toFixed(2);
}

function formatMetric(val, eq) {
  if (val === null || val === undefined || isNaN(val)) return "—";
  if (eq === "education_funding" || eq === "income_equity" || eq === "labor_rights") {
    return "$" + Math.abs(Math.round(val)).toLocaleString();
  }
  if (eq === "education_equity" || eq === "criminal_justice") {
    return Math.abs(val).toFixed(4);
  }
  if (eq === "economic_equity") {
    return Math.abs(val).toFixed(3);
  }
  return Math.abs(val).toFixed(1) + "%";
}

function formatDispVal(val, eq) {
  if (val === null || val === undefined) return "—";
  const v = Math.abs(val);
  if (eq === "education_funding" || eq === "income_equity" || eq === "labor_rights") {
    return "$" + Math.round(v).toLocaleString();
  }
  if (eq === "education_equity" || eq === "criminal_justice") {
    return v.toFixed(4);
  }
  if (eq === "economic_equity") {
    return v.toFixed(3);
  }
  return v.toFixed(1) + "%";
}
